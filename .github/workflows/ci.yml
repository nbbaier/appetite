name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run biome checks
        run: npm run check

      - name: Run tests
        run: npm run test

      - name: Run build
        run: npm run build
